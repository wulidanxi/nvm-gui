name: Release

# Tag releases are handled by ci.yml, which runs validation before its single
# release job. Keep this legacy workflow manual-only to avoid duplicate uploads.
on:
  workflow_dispatch:

jobs:
  build_release_windows:
    runs-on: windows-latest
    env:
      # Only create the GitHub Release after all three platform artifacts are ready.
      ELECTRON_BUILDER_PUBLISH: never
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock
      - run: yarn install --frozen-lockfile --ignore-scripts
      - name: Build Windows installer
        run: npm run build:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          ELECTRON_CACHE: ${{ github.workspace }}\.cache\electron
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}\.cache\electron-builder
      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: nvm-gui-windows
          path: |
            dist/electron/*.exe
            dist/electron/*.exe.blockmap
            dist/electron/latest*.yml

  build_release_macos:
    runs-on: macos-latest
    env:
      ELECTRON_BUILDER_PUBLISH: never
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock
      - run: yarn install --frozen-lockfile --ignore-scripts
      - name: Build macOS package
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: nvm-gui-macos
          path: |
            dist/electron/*.dmg
            dist/electron/*.zip
            dist/electron/latest*.yml

  build_release_linux:
    runs-on: ubuntu-latest
    env:
      ELECTRON_BUILDER_PUBLISH: never
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libopenjp2-tools
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock
      - run: yarn install --frozen-lockfile --ignore-scripts
      - name: Build Linux packages
        run: npm run build:linux
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: nvm-gui-linux
          path: |
            dist/electron/*.AppImage
            dist/electron/*.deb
            dist/electron/latest*.yml

  create_release:
    runs-on: ubuntu-latest
    needs:
      - build_release_windows
      - build_release_macos
      - build_release_linux
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nvm-gui-*
          path: dist/electron
          merge-multiple: true
      - name: Extract Release Notes from CHANGELOG.md
        run: node scripts/extract-changelog.js
        env:
          CHANGELOG_VERSION: ${{ github.ref_name }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/electron/*.exe
            dist/electron/*.exe.blockmap
            dist/electron/*.dmg
            dist/electron/*.zip
            dist/electron/*.AppImage
            dist/electron/*.deb
            dist/electron/latest*.yml
          body_path: CHANGELOG_RELEASE.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

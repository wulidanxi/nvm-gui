name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  lint_and_test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node: [22.x]
        os: [ubuntu-latest, windows-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: yarn
          cache-dependency-path: yarn.lock
      - run: yarn install --frozen-lockfile --ignore-scripts
      - name: Audit production dependencies
        shell: bash
        run: yarn audit --groups dependencies --level high
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - name: Run coverage
        run: npm run test:coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-${{ matrix.node }}
          path: coverage/**

  build_windows:
    runs-on: windows-latest
    env:
      WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
      # The release job uploads all installers and update metadata after every
      # platform build succeeds. Prevent parallel build jobs from creating the
      # same GitHub Release themselves.
      ELECTRON_BUILDER_PUBLISH: never
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock
      - name: Prepare caches
        uses: actions/cache@v4
        with:
          path: |
            .cache/electron
            .cache/electron-builder
          key: electron-cache-${{ runner.os }}-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}
          restore-keys: |
            electron-cache-${{ runner.os }}-
      - run: yarn install --frozen-lockfile --ignore-scripts
      - name: Build
        run: npm run build:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          ELECTRON_CACHE: ${{ github.workspace }}\.cache\electron
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}\.cache\electron-builder
      - name: Report renderer bundle
        run: npm run analyze:bundle
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: nvm-gui-windows
          path: |
            dist/electron/*.exe
            dist/electron/*.exe.blockmap
            dist/electron/latest*.yml
      - name: Verify Windows signing state
        shell: powershell
        run: |
          if ($env:WIN_CSC_LINK -and $env:WIN_CSC_KEY_PASSWORD) {
            $exe = Get-ChildItem dist/electron/*.exe | Select-Object -First 1
            if (-not $exe) { throw 'No Windows installer was produced' }
            if ((Get-AuthenticodeSignature -FilePath $exe.FullName).Status -ne 'Valid') { throw 'Windows installer is not Authenticode-valid' }
            Set-Content -LiteralPath signing-status.txt -Value Valid -NoNewline -Encoding ascii
          } else {
            Set-Content -LiteralPath signing-status.txt -Value unsigned -NoNewline -Encoding ascii
          }
      - uses: actions/upload-artifact@v4
        with:
          name: windows-signing-status
          path: signing-status.txt

  build_macos:
    runs-on: macos-latest
    env:
      ELECTRON_BUILDER_PUBLISH: never
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock
      - name: Prepare caches
        uses: actions/cache@v4
        with:
          path: |
            .cache/electron
            .cache/electron-builder
          key: electron-cache-${{ runner.os }}-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}
          restore-keys: |
            electron-cache-${{ runner.os }}-
      - run: yarn install --frozen-lockfile --ignore-scripts
      - name: Build
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: nvm-gui-macos
          path: |
            dist/electron/*.dmg
            dist/electron/*.zip
            dist/electron/latest*.yml

  build_linux:
    runs-on: ubuntu-latest
    env:
      ELECTRON_BUILDER_PUBLISH: never
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libopenjp2-tools
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock
      - name: Prepare caches
        uses: actions/cache@v4
        with:
          path: |
            .cache/electron
            .cache/electron-builder
          key: electron-cache-${{ runner.os }}-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}
          restore-keys: |
            electron-cache-${{ runner.os }}-
      - run: yarn install --frozen-lockfile --ignore-scripts
      - name: Build
        run: npm run build:linux
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: nvm-gui-linux
          path: |
            dist/electron/*.AppImage
            dist/electron/*.deb
            dist/electron/latest*.yml

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint_and_test, build_windows, build_macos, build_linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock
      - name: Verify release version contract
        run: node scripts/verify-release-version.js
      - uses: actions/download-artifact@v4
        with:
          pattern: nvm-gui-*
          path: dist/electron
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: windows-signing-status
          path: signing-status
      - id: windows
        shell: bash
        run: |
          STATUS="$(cat signing-status/signing-status.txt)"
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"
          echo "signed=$([[ ${STATUS} == Valid ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
      - run: node scripts/extract-changelog.js
        env:
          CHANGELOG_VERSION: ${{ github.ref_name }}
      - name: Mark unsigned Windows installer
        if: steps.windows.outputs.signed != 'true'
        shell: bash
        run: |
          printf '\n\n> WARNING: The Windows installer is currently unsigned. SmartScreen may show a warning on first run. Download only from this GitHub Release.\n' >> CHANGELOG_RELEASE.md
      - name: Remove previously uploaded release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          assets="$(gh release view "$GITHUB_REF_NAME" --json assets --jq '.assets[].name' 2>/dev/null || true)"
          while IFS= read -r asset; do
            [ -z "$asset" ] || gh release delete-asset "$GITHUB_REF_NAME" "$asset" --yes
          done <<< "$assets"
      - uses: softprops/action-gh-release@v1
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          overwrite_files: true
          preserve_order: true
          files: |
            dist/electron/*.exe
            dist/electron/*.exe.blockmap
            dist/electron/*.dmg
            dist/electron/*.zip
            dist/electron/*.AppImage
            dist/electron/*.deb
            dist/electron/latest*.yml
          body_path: CHANGELOG_RELEASE.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint_and_test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node: [20.x, 22.x]
        os: [ubuntu-latest, windows-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: yarn
          cache-dependency-path: yarn.lock
      - run: yarn install --frozen-lockfile
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - name: Run coverage
        run: npm run test:coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-${{ matrix.node }}
          path: coverage/**

  build_windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: yarn
          cache-dependency-path: yarn.lock
      - name: Prepare caches
        uses: actions/cache@v4
        with:
          path: |
            .cache/electron
            .cache/electron-builder
          key: electron-cache-${{ runner.os }}-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}
          restore-keys: |
            electron-cache-${{ runner.os }}-
      - run: yarn install --frozen-lockfile
      - name: Build
        run: npm run build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          ELECTRON_CACHE: ${{ github.workspace }}\.cache\electron
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}\.cache\electron-builder
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: nvm-gui-installer
          path: |
            dist/electron/*.exe
            dist/electron/*.exe.blockmap

  release_on_main:
    runs-on: ubuntu-latest
    needs:
      - lint_and_test
      - build_windows
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: yarn
          cache-dependency-path: yarn.lock
      - name: Resolve release version
        id: version
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Check whether release tag exists
        id: tag
        shell: bash
        run: |
          if git ls-remote --exit-code --tags origin "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Stop when version is already released
        if: steps.tag.outputs.exists == 'true'
        run: echo "Release ${{ steps.version.outputs.tag }} already exists, skipping."
      - name: Download Windows installer artifact
        if: steps.tag.outputs.exists != 'true'
        uses: actions/download-artifact@v4
        with:
          name: nvm-gui-installer
          path: dist/electron
      - name: Extract release notes
        if: steps.tag.outputs.exists != 'true'
        run: node scripts/extract-changelog.js
        env:
          GITHUB_REF_NAME: ${{ steps.version.outputs.tag }}
      - name: Create and push release tag
        if: steps.tag.outputs.exists != 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}" "${GITHUB_SHA}"
          git push origin "${{ steps.version.outputs.tag }}"
      - name: Create GitHub Release
        if: steps.tag.outputs.exists != 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            dist/electron/*.exe
            dist/electron/*.exe.blockmap
          body_path: CHANGELOG_RELEASE.md

  prepare_caches_linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: yarn
          cache-dependency-path: yarn.lock
      - name: Prepare caches
        uses: actions/cache@v4
        with:
          path: |
            .cache/electron
            .cache/electron-builder
          key: electron-cache-${{ runner.os }}-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}
          restore-keys: |
            electron-cache-${{ runner.os }}-
      - run: yarn install --frozen-lockfile
        env:
          ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

  prepare_caches_macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: yarn
          cache-dependency-path: yarn.lock
      - name: Prepare caches
        uses: actions/cache@v4
        with:
          path: |
            .cache/electron
            .cache/electron-builder
          key: electron-cache-${{ runner.os }}-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}
          restore-keys: |
            electron-cache-${{ runner.os }}-
      - run: yarn install --frozen-lockfile
        env:
          ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
